    <script>
      (function() {
        // Automatically synchronize the favicon if a custom uploaded logo exists
        try {
          var customLogo = localStorage.getItem('torky_custom_logo');
          if (customLogo) {
            var icon = document.getElementById('app-favicon');
            if (icon) {
              icon.href = customLogo;
              // Remove the type so custom data URLs work everywhere
              icon.removeAttribute('type');
            }
          }
        } catch (e) {
          console.warn('Gagal memuat kustom favicon:', e);
        }
      })();
    </script>

  <body>
